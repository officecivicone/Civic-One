<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicOne | Administrative Command</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --admin-navy: #0f172a; --admin-border: #e2e8f0; }
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; display: flex; min-height: 100vh; }
        
        /* Sidebar Layout for Desktop */
        .sidebar { width: 260px; background: var(--admin-navy); color: white; position: fixed; height: 100vh; padding: 2rem 1.5rem; }
        .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 2rem 3rem; }
        
        .sidebar-brand { font-size: 1.5rem; font-weight: 800; color: white; text-decoration: none; margin-bottom: 3rem; display: block; }
        .sidebar-link { color: #94a3b8; text-decoration: none; display: flex; align-items: center; padding: 12px 0; font-weight: 500; transition: 0.2s; }
        .sidebar-link:hover, .sidebar-link.active { color: white; }
        .sidebar-link i { margin-right: 12px; font-size: 1.2rem; }

        .table-container { background: white; border-radius: 12px; border: 1px solid var(--admin-border); overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .table thead { background: #f1f5f9; }
        .table th { font-size: 0.75rem; text-transform: uppercase; color: #64748b; padding: 15px; border: none; }
        .table td { padding: 18px 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        
        .img-thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; cursor: pointer; }
        .badge-status { font-size: 0.7rem; font-weight: 700; padding: 4px 10px; border-radius: 4px; text-transform: uppercase; }
        .btn-dispatch { background: #3b82f6; color: white; border: none; padding: 6px 16px; border-radius: 6px; font-weight: 600; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="sidebar d-none d-lg-block">
        <a href="#" class="sidebar-brand">CIVIC<span>ONE</span></a>
        <a href="#" class="sidebar-link active"><i class="bi bi-grid-1x2-fill"></i> Oversight Feed</a>
        <a href="#" class="sidebar-link"><i class="bi bi-people"></i> User Records</a>
        <a href="#" class="sidebar-link"><i class="bi bi-graph-up"></i> Analytics</a>
        <div style="margin-top: auto;">
            <button class="btn btn-outline-danger w-100 btn-sm" onclick="localStorage.clear(); window.location.href='login.html'">Terminate Session</button>
        </div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 class="fw-bold mb-1">Issue Dispatch Control</h2>
                <p class="text-muted small">Monitor community reports and assign to municipal units.</p>
            </div>
            <div class="text-end">
                <span class="badge bg-success-subtle text-success border border-success p-2">System Status: Active</span>
            </div>
        </div>

        <div class="table-container">
            <table class="table mb-0">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Evidence</th>
                        <th>Subject & Origin</th>
                        <th>Status</th>
                        <th>Assigned Department</th>
                        <th>Dispatch</th>
                    </tr>
                </thead>
                <tbody id="adminBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const depts = ['Water Supply', 'Road and Infra', 'Sanitation', 'Drainage', 'Public Safety'];

        async function loadAdmin() {
            const res = await fetch('/api/admin/all-issues');
            const data = await res.json();
            document.getElementById('adminBody').innerHTML = data.map(i => `
                <tr>
                    <td class="fw-bold text-muted">#${i.id}</td>
                    <td><img src="${i.image_path || 'https://via.placeholder.com/40'}" class="img-thumb" onclick="window.open('${i.image_path}')"></td>
                    <td>
                        <div class="fw-bold text-dark">${i.category}</div>
                        <div class="small text-muted">Reported by: ${i.full_name || 'Citizen'}</div>
                    </td>
                    <td><span class="badge-status ${i.status === 'Resolved' ? 'bg-success-subtle text-success' : 'bg-warning-subtle text-warning'}">${i.status}</span></td>
                    <td>
                        <select class="form-select form-select-sm border-light bg-light" id="d-${i.id}">
                            <option value="Unassigned">Assign...</option>
                            ${depts.map(d => `<option value="${d}" ${i.department === d ? 'selected' : ''}>${d}</option>`).join('')}
                        </select>
                    </td>
                    <td><button class="btn-dispatch" onclick="assign(${i.id})">Execute</button></td>
                </tr>
            `).join('');
        }

        async function assign(id) {
            const department = document.getElementById(`d-${id}`).value;
            await fetch('/api/admin/assign', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, department })
            });
            alert('Protocol: Dispatch Recorded.'); loadAdmin();
        }
        loadAdmin();
    </script>
</body>
</html>

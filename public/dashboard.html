<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicOne | Citizen Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --navy: #0f172a; --green: #10b981; --slate: #f8fafc; }
        body { background-color: var(--navy); font-family: 'Inter', sans-serif; padding-bottom: 80px; color: white; }
        
        .dashboard-container { background-color: white; color: var(--navy); min-height: 100vh; border-radius: 30px 30px 0 0; margin-top: 20px; padding-top: 20px; }
        
        .hero { padding: 2rem 1.5rem; text-align: left; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; margin-top: -40px; }
        .stat-card { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); padding: 20px 10px; border-radius: 15px; text-align: center; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        .section-label { font-size: 0.75rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin: 2rem 0 1rem 1.5rem; }
        .cat-card { background: white; border: 1px solid #e2e8f0; padding: 18px; border-radius: 20px; margin: 0 15px 12px 15px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .cat-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        .icon-box { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-right: 15px; background: #f1f5f9; font-size: 1.2rem; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #e2e8f0; z-index: 1000; }
        .nav-item { color: #94a3b8; text-decoration: none; font-size: 0.7rem; text-align: center; font-weight: 600; }
        .nav-item.active { color: var(--navy); }
        .nav-item i { display: block; font-size: 1.4rem; }
        
        .profile-img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--green); }
    </style>
</head>
<body>

    <div class="hero">
        <div class="container d-flex justify-content-between align-items-center mb-3">
            <span class="fw-bold tracking-widest">CIVICONE.</span>
            <div id="userProfile" class="d-flex align-items-center gap-2">
                </div>
        </div>
        <h1 class="fw-bold display-6 px-2">Clean City,<br><span class="text-success">Better Living.</span></h1>
    </div>

    <div class="stat-grid">
        <div class="stat-card">
            <h3 id="statTotal" class="fw-bold mb-0 text-white">0</h3>
            <small class="text-muted small">Total</small>
        </div>
        <div class="stat-card">
            <h3 id="statPending" class="fw-bold mb-0 text-warning">0</h3>
            <small class="text-muted small">Pending</small>
        </div>
        <div class="stat-card">
            <h3 id="statResolved" class="fw-bold mb-0 text-success">0</h3>
            <small class="text-muted small">Fixed</small>
        </div>
    </div>

    <div class="dashboard-container mt-4">
        <p class="section-label">Report Infrastructure Issue</p>
        
        <div class="cat-card" onclick="location.href='report.html?cat=Water Supply'">
            <div class="icon-box text-primary"><i class="bi bi-droplet"></i></div>
            <div class="flex-grow-1"><div class="fw-bold">Water Supply</div><small class="text-muted">Leaks, shortage, or quality</small></div>
            <i class="bi bi-chevron-right text-muted"></i>
        </div>

        <div class="cat-card" onclick="location.href='report.html?cat=Road and Infra'">
            <div class="icon-box text-danger"><i class="bi bi-cone-striped"></i></div>
            <div class="flex-grow-1"><div class="fw-bold">Road and Infra</div><small class="text-muted">Potholes or streetlights</small></div>
            <i class="bi bi-chevron-right text-muted"></i>
        </div>

        <div class="cat-card" onclick="location.href='report.html?cat=Sanitation'">
            <div class="icon-box text-success"><i class="bi bi-trash"></i></div>
            <div class="flex-grow-1"><div class="fw-bold">Sanitation</div><small class="text-muted">Garbage removal</small></div>
            <i class="bi bi-chevron-right text-muted"></i>
        </div>

        <div class="cat-card" onclick="location.href='report.html?cat=Drainage'">
            <div class="icon-box text-warning"><i class="bi bi-water"></i></div>
            <div class="flex-grow-1"><div class="fw-bold">Drainage</div><small class="text-muted">Blocked pipes or sewage</small></div>
            <i class="bi bi-chevron-right text-muted"></i>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active"><i class="bi bi-grid-fill"></i>Home</a>
        <a href="map.html" class="nav-item"><i class="bi bi-geo-alt"></i>Map</a>
        <a href="report.html" class="nav-item"><i class="bi bi-plus-circle-fill" style="font-size: 1.8rem; color: var(--navy);"></i></a>
        <a href="history.html" class="nav-item"><i class="bi bi-clock-history"></i>History</a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // --- 1. CONFIGURATION ---
        const SUPABASE_URL = 'https://zwrqhmqcxkxgslknvgcw.supabase.co';
        const SUPABASE_ANON_KEY = 'YOUR_ACTUAL_ANON_KEY'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- 2. AUTH & SESSION SYNC ---
        async function initDashboard() {
            const { data: { user } } = await _supabase.auth.getUser();

            if (user) {
                // Save user ID for API calls
                localStorage.setItem('userId', user.id);
                localStorage.setItem('userEmail', user.email);

                // Update Profile UI with Google Data
                const profileName = user.user_metadata.full_name || "User";
                const profilePic = user.user_metadata.avatar_url;
                
                document.getElementById('userProfile').innerHTML = `
                    <span class="small fw-bold">${profileName.split(' ')[0]}</span>
                    <img src="${profilePic}" class="profile-img" alt="profile">
                `;

                // Load Stats
                fetchStats();
            } else {
                // Redirect to login if no session found
                window.location.href = 'login.html';
            }
        }

        // --- 3. FETCH LIVE STATS FROM SERVER.JS ---
        async function fetchStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                
                // Replace 'undefined' with actual data or 0
                document.getElementById('statTotal').innerText = data.total || 0;
                document.getElementById('statPending').innerText = data.pending || 0;
                document.getElementById('statResolved').innerText = data.resolved || 0;
            } catch (err) {
                console.error("Stats fetch failed:", err);
            }
        }

        // --- 4. LOGOUT ---
        async function logout() {
            await _supabase.auth.signOut();
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Run on load
        initDashboard();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicOne | Secure Access Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --navy: #0f172a; --accent: #3b82f6; }
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; }
        .login-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; width: 100%; max-width: 400px; margin: auto; }
        .login-header { background: var(--navy); color: white; padding: 30px; text-align: center; }
        .btn-login { background: var(--navy); color: white; border: none; width: 100%; padding: 12px; font-weight: 600; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h4 class="fw-bold mb-0">CIVICONE</h4>
            <p class="small opacity-50 mb-0">Official Access Gateway</p>
        </div>
        <div class="p-4">
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@civicone.gov" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted text-uppercase">Security Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login mb-3">Authorize Access</button>
                <div class="text-center small">
                    <a href="#" class="text-decoration-none text-muted">Register Citizen Account</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if(data.role === 'dept') {
                localStorage.setItem('activeDept', data.dept);
            }
            window.location.href = data.redirect;
        };
    </script>
</body>
</html>

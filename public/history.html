<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>CivicOne | History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 80px; }
        .header { background: #0f172a; color: white; padding: 40px 20px; border-radius: 0 0 25px 25px; }
        .case-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 15px; margin-bottom: 12px; }
        .status { font-size: 0.7rem; font-weight: 800; padding: 4px 10px; border-radius: 4px; text-transform: uppercase; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="header">
        <h2 class="fw-bold">My Submissions</h2>
        <p class="small opacity-50 mb-0">Official case history</p>
    </div>
    <div class="container mt-4" id="histGrid"></div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="text-muted text-decoration-none small text-center"><i class="bi bi-house d-block fs-4"></i>Home</a>
        <a href="history.html" class="text-dark text-decoration-none small text-center"><i class="bi bi-clock-history d-block fs-4"></i>History</a>
    </nav>

    <script>
        async function load() {
            const uid = localStorage.getItem('userId');
            const res = await fetch(`/api/my-reports?userId=${uid}`);
            const data = await res.json();
            document.getElementById('histGrid').innerHTML = data.map(i => `
                <div class="case-card shadow-sm">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="small fw-bold text-muted">CASE #${i.id}</span>
                        <span class="status ${i.status === 'Resolved' ? 'bg-success text-white' : 'bg-warning text-dark'}">${i.status}</span>
                    </div>
                    <h6 class="fw-bold">${i.category}</h6>
                    <p class="small text-muted mb-0">${i.description}</p>
                </div>
            `).join('');
        }
        load();
    </script>
</body>
</html>

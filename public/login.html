<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicOne | Secure Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --navy: #0f172a; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; display: flex; align-items: center; height: 100vh; }
        .login-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; width: 100%; max-width: 400px; margin: auto; }
        .login-header { background: var(--navy); color: white; padding: 30px; text-align: center; border-radius: 12px 12px 0 0; }
        .btn-login { background: var(--navy); color: white; border: none; width: 100%; padding: 12px; font-weight: 600; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header"><h4 class="fw-bold mb-0">CIVICONE</h4><p class="small opacity-50 mb-0">Authorized Gateway</p></div>
        <div class="p-4">
            <form id="loginForm">
                <div class="mb-3"><label class="small fw-bold text-muted text-uppercase">Email</label><input type="email" id="email" class="form-control" required></div>
                <div class="mb-4"><label class="small fw-bold text-muted text-uppercase">Password</label><input type="password" id="password" class="form-control" required></div>
                <button type="submit" class="btn-login mb-3">Authorize</button>
                <div class="text-center"><a href="signup.html" class="small text-muted text-decoration-none">New Citizen? Register Here</a></div>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
            });
            const data = await res.json();
            if(res.ok) {
                localStorage.setItem('userId', data.userId);
                localStorage.setItem('activeDept', data.dept);
                window.location.href = data.redirect;
            } else { alert("Access Denied"); }
        };
    </script>
</body>
</html>

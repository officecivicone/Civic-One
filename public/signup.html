<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>CivicOne | Enroll</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; display: flex; align-items: center; height: 100vh; }
        .card { border-radius: 12px; border: 1px solid #e2e8f0; max-width: 400px; width: 100%; margin: auto; }
        .btn-dark { background: #0f172a; border: none; padding: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card shadow-sm p-4">
        <h4 class="fw-bold mb-1">Citizen Enrollment</h4>
        <p class="small text-muted mb-4">Create your official reporting profile.</p>
        <form id="signForm">
            <input type="text" id="name" class="form-control mb-3" placeholder="Full Name" required>
            <input type="email" id="email" class="form-control mb-3" placeholder="Email Address" required>
            <input type="password" id="pass" class="form-control mb-4" placeholder="Security Password" required>
            <button type="submit" class="btn btn-dark w-100">Complete Enrollment</button>
            <div class="text-center mt-3"><a href="login.html" class="small text-muted text-decoration-none">Back to Login</a></div>
        </form>
    </div>
    <script>
        document.getElementById('signForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('pass').value
                })
            });
            if(res.ok) { alert("Success! Please log in."); window.location.href="login.html"; }
            else { alert("Email already exists."); }
        };
    </script>
</body>
</html>
